<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFG - Catálogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #0a0a0a;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header h1 i {
            margin-right: 10px;
            color: #dc2626;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-volver, .btn-descargar {
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-volver {
            background: #2d2d2d;
            color: white;
        }

        .btn-volver:hover {
            background: #3d3d3d;
            transform: translateY(-1px);
        }

        .btn-descargar {
            background: #f01313;
            color: white;
        }

        .btn-descargar:hover {
            background: #fd1302;
            transform: translateY(-1px);
        }

        .pdf-container {
            flex: 1;
            width: 100%;
            background: #f5f5f5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .header {
                padding: 0.8rem 1rem;
                flex-direction: column;
                text-align: center;
            }
            .btn-group {
                width: 100%;
                justify-content: center;
            }
            .btn-volver, .btn-descargar {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-file-pdf"></i> FFG - Accesorios Organizadores</h1>
        <div class="btn-group">
            <button onclick="window.location.href='catalogo.html'" class="btn-volver">
                <i class="fas fa-arrow-left"></i> Volver al catálogo
            </button>
            <button onclick="descargarPDF()" class="btn-descargar">
                <i class="fas fa-download"></i> Descargar PDF
            </button>
        </div>
    </div>
    <div class="pdf-container">
        <iframe id="pdfFrame" src="CHAPILLAS.pdf" title="Catálogo FFG"></iframe>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script>
        function descargarPDF() {
            // Forzar descarga del PDF
            const link = document.createElement('a');
            link.href = 'CHAPILLAS.pdf';
            link.download = 'FFG_Catalogo.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
