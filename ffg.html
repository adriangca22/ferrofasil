<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFG - Catálogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #0a0a0a;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .header h1 {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header h1 i {
            margin-right: 10px;
            color: #dc2626;
        }

        .btn-cerrar {
            background: #dc2626;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-cerrar:hover {
            background: #b91c1c;
        }

        .pdf-container {
            flex: 1;
            width: 100%;
            background: #f5f5f5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-file-pdf"></i> FFG - Accesorios Organizadores</h1>
        <button onclick="window.close()" class="btn-cerrar">
            <i class="fas fa-times"></i> Cerrar ventana
        </button>
    </div>
    <div class="pdf-container">
        <!-- EL PDF ESTÁ EN LA RAÍZ, NO EN CARPETA pdfs/ -->
        <iframe src="CHAPILLAS.pdf" title="Catálogo FFG"></iframe>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
