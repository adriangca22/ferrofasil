<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnomat - Catálogo 2026 | Ferrofasil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pdf-header {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid #dc2626;
        }

        .pdf-header h1 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pdf-header h1 i {
            color: #dc2626;
        }

        .btn-volver {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-volver:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-descargar {
            background: #dc2626;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-descargar:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        .pdf-container {
            flex: 1;
            width: 100%;
            background: #e5e7eb;
        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .pdf-header {
                flex-direction: column;
                text-align: center;
                padding: 12px;
            }
            .pdf-header h1 {
                font-size: 1rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="pdf-header">
        <h1>
            <i class="fas fa-file-pdf"></i>
            Tecnomat - Herrajes y Accesorios 2026
        </h1>
        <div style="display: flex; gap: 12px;">
            <a href="catalogo.html" class="btn-volver">
                <i class="fas fa-arrow-left"></i> Volver al catálogo
            </a>
            <a href="tecno.pdf" download="tecno.pdf" class="btn-descargar">
                <i class="fas fa-download"></i> Descargar PDF
            </a>
        </div>
    </div>
    <div class="pdf-container">
        <iframe src="tecno.pdf" title="Tecnomat Catálogo 2026"></iframe>
    </div>
</body>
</html>
